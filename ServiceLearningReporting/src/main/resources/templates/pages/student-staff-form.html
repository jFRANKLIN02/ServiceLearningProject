<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Service Learning Activity Log</title>
</head>
<body>
<!--/*@thymesVar id="activityForm" type="org.example.servicelearningreporting.models.ActivityForm"*/-->
    <form th:object="${activityForm}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <label>Created On:</label>
        <input type="text"
               th:value="${#temporals.format(activityForm.timestamp, 'yyyy-MM-dd    HH:mm a')}"
               readonly><br>
        <!-- Date -->
        <div>
            <label>Date of Activity:</label>
            <input type="date" th:field="*{date}" required>
            <div th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
        </div><br>

        <!-- Times -->
        <div>
            <label>Start Time:</label>
            <input type="time" id="startTime" th:field="*{startTime}" required>

            <label>End Time:</label>
            <input type="time" id="endTime" th:field="*{endTime}" required>

            <label>Total Time:</label>
            <input type="text" id="totalHours" th:field="*{totalHours}">
        </div><br>

        <!-- Organization -->
        <div>
            <label>Name of Organization:</label><br>
            <input type="text" th:field="*{organizationName}" th:readonly="${readOnly}" required>
        </div><br>

        <!-- Contact Info -->
        <div>
            <label>Contact Name:</label>
            <input type="text" th:field="*{contactName}" th:readonly="${readOnly}" required>

            <label>City:</label>
            <select th:field="*{city}" th:disabled="${readOnly}" required>
                <option value="">-- Select a City --</option>
                <option value="Fredericton">Fredericton</option>
                <option value="Oromocto">Oromocto</option>
                <option value="Miramichi">Miramichi</option>
                <option value="Moncton">Moncton</option>
                <option value="Dieppe">Dieppe</option>
                <option value="Riverview">Riverview</option>
                <option value="Saint John">Saint John</option>
                <option value="Quispamsis">Quispamsis</option>
                <option value="Rothesay">Rothesay</option>
                <option value="St. Andrews">St. Andrews</option>
                <option value="Woodstock">Woodstock</option>
            </select>

            <label>Email:</label>
            <input type="email" th:field="*{email}" th:readonly="${readOnly}" required>

            <label>Phone:</label>
            <input type="tel" th:field="*{phone}" th:readonly="${readOnly}" required>
        </div><br>

        <!-- Description -->
        <div>
            <label>Activity Description:</label><br>
            <textarea th:field="*{activityDescription}" th:readonly="${readOnly}" required></textarea>
        </div><br>

        <!-- Donations -->
        <div>
            <label>Donations (Cash):</label>
            <input type="number" step="0.25" th:field="*{donations}" min="'$' + 0.00" th:readonly="${readOnly}">
        </div><br>

        <!-- Buttons -->
        <div th:if="${!readOnly}">
            <div th:if="${isEdit}">
                <button type="submit" formaction="/activityForm/update">
                    Update
                </button>

                <button type="submit" onclick="window.location.href='/activityForm/submitted'">
                    Cancel
                </button>
            </div>
            <div th:if="${!isEdit}">
                <button type="submit" formaction="/activityForm/form-save">
                    Save For Later
                </button>

                <button type="submit" formaction="/activityForm/form-submit">
                    Submit
                </button>
            </div>
        </div>
        <div th:if="${readOnly}">
            <button type="button" onclick="window.location.href='/activityForm/submitted'">
                Back
            </button>
        </div>
    </form>
<!--JavaScript for total time calculation-->
<script>
    function calculateHours() {
        const start = document.getElementById("startTime").value;
        const end = document.getElementById("endTime").value;

        if (start && end) {
            const [startHour, startMinute] = start.split(":").map(Number);
            const [endHour, endMinute] = end.split(":").map(Number);

            let startTotal = startHour * 60 + startMinute;
            let endTotal = endHour * 60 + endMinute;

            if (endTotal < startTotal) {
                endTotal += 24 * 60;
            }

            const diffMinutes = endTotal - startTotal;

            const hours = Math.floor(diffMinutes / 60);
            const minutes = diffMinutes % 60;
            //Readable version
            document.getElementById("totalHours").value =
                `${hours} hrs ${minutes} min`;
        }
    }
    document.getElementById("startTime").addEventListener("change", calculateHours);
    document.getElementById("endTime").addEventListener("change", calculateHours);
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Service Learning Activity Log</title>
</head>
<body>
    <form th:object="${activityForm}" th:action="@{/activityForm}" method="post">
        <label>Created On:</label>
        <input type="text"
               th:value="${#temporals.format(activityForm.timestamp, 'yyyy-MM-dd HH:mm')}"
               readonly
                th:field="*{timestamp}"><br>
        <!-- Date -->
        <div>
            <label>Date of Activity:</label>
            <input type="date" th:field="*{date}" required>
            <div th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
        </div><br>

        <!-- Times -->
        <div>
            <label>Start Time:</label>
            <input type="time" th:field="*{startTime}" required>

            <label>End Time:</label>
            <input type="time" th:field="*{endTime}" required>

            <label>Total Hours:</label>
            <input type="number" th:field="*{totalHours}" min="1" readonly>
        </div><br>

        <!-- Organization -->
        <div>
            <label>Name of Organization:</label><br>
            <input type="text" th:field="*{organizationName}" required>
        </div><br>

        <!-- Contact Info -->
        <div>
            <label>Contact Name:</label>
            <input type="text" th:field="*{contactName}" required>

            <label>City:</label>
            <input type="text" th:field="*{city}" required>

            <label>Email:</label>
            <input type="email" th:field="*{email}" required>

            <label>Phone:</label>
            <input type="tel" th:field="*{phone}" required>
        </div><br>

        <!-- Description -->
        <div>
            <label>Activity Description:</label><br>
            <textarea th:field="*{activityDescription}" required></textarea>
        </div><br>

        <!-- Donations -->
        <div>
            <label>Donations (Cash):</label>
            <input type="number" step="0.01" th:field="*{donations}" min="0">
        </div><br>

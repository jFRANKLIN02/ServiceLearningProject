<head>
    <title>Service Learning - In-Progress Forms</title>
</head>
<body>
    <div class="container">
        <h1>
            In-Progress Forms
        </h1>
        <!--Search-->
        <label>Search:</label>
        <input type="text" id="searchBox" placeholder="Search...">
        <button onclick="searchInProgressForms()">Search</button>
        <script>
            function searchInProgressForms() {
                const query = document.getElementById("searchBox").value;
                window.location.href = "/activityForm/inProgress?search=" + query;
            }
        </script>
        <!--Sort-->
        <label>Sort by Activity Date:</label>
        <select onchange="window.location.href='/activityForm/inProgress?sort=' + this.value">
            <option value=""></option>
            <option value="desc">Newest to Oldest</option>
            <option value="asc">Oldest to Newest</option>
        </select>
        <!--Table of forms-->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Contact Name</th>
                    <th>Org Name</th>
                    <th>Activity Date</th>
                    <th>Creation Date</th> <!-- auto generated local time field-->
                    <th>Form Type</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            <!--If search has no results-->
            <tr th:if="${#lists.isEmpty(activityForms)}">
                <td align="center" colspan="7">No results found.</td>
            </tr>
            <!--/*@thymesVar id="activityForm" type="org.example.servicelearningreporting.models.ActivityForm"*/-->
                <tr th:each="activityForm : ${activityForms}">
                    <td th:text="${activityForm.id}"></td>
                    <td th:text="${activityForm.contactName}"></td>
                    <td th:text="${activityForm.organizationName}"></td>
                    <td th:text="${activityForm.date}"></td>
                    <td th:text="${#temporals.format(activityForm.timestamp, 'yyyy-MM-dd')}"></td>
                    <td th:text="${activityForm.formType}"></td>
                    <!--edit/details-->
                    <td>
                        <a th:href="@{/activityForm/edit/{id}(id=${activityForm.id})}">
                            Edit
                        </a>
                        <a th:href="@{/activityForm/details/{id}(id=${activityForm.id})}">
                            Details
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

<head>
    <title>Service Learning - Submitted Forms</title>
</head>
<body>
    <div class="container">
        <h1>
            Submitted Forms
        </h1>
        <!--Search-->
        <label>Search:</label>
        <input type="text" id="searchBox" placeholder="Search...">
        <button onclick="searchSubmittedForms()">Search</button>
        <script>
            function searchSubmittedForms() {
                const query = document.getElementById("searchBox").value;
                window.location.href = "/activityForm/submitted?search=" + query;
            }
        </script>
        <!--Sort-->
        <label>Sort by Activity Date:</label>
        <select onchange="window.location.href='/activityForm/submitted?sort=' + this.value">
            <option value=""></option>
            <option value="desc">Newest to Oldest</option>
            <option value="asc">Oldest to Newest</option>
        </select>
        <!--Pagination-->
        <label>Show:</label>
        <select onchange="window.location.href='/activityForm/submitted?size=' + this.value">
            <option value="25" th:selected="${size == 25}">25</option>
            <option value="50" th:selected="${size == 50}">50</option>
            <option value="100" th:selected="${size == 100}">100</option>
        </select>
        <!--Table of forms-->
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Contact Name</th>
                <th>Org Name</th>
                <th>Activity Date</th>
                <th>Creation Date</th> <!-- auto generated local time field-->
                <th>Form Type</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <!--If search has no results-->
            <tr th:if="${#lists.isEmpty(activityForms)}">
                <td align="center" colspan="7">No results found.</td>
            </tr>
            <!--/*@thymesVar id="activityForm" type="org.example.servicelearningreporting.models.ActivityForm"*/-->
            <tr th:each="activityForm : ${activityForms}">
                <td th:text="${activityForm.id}"></td>
                <td th:text="${activityForm.contactName}"></td>
                <td th:text="${activityForm.organizationName}"></td>
                <td th:text="${activityForm.date}"></td>
                <td th:text="${#temporals.format(activityForm.timestamp, 'yyyy-MM-dd')}"></td>
                <td th:text="${activityForm.formType}"></td>
                <!--edit/details-->
                <td>
                    <a th:href="@{/activityForm/edit/{id}(id=${activityForm.id})}">
                        Edit
                    </a>
                    <a th:href="@{/activityForm/details/{id}(id=${activityForm.id})}">
                        Details
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
        <!--Pagination-->
        <div>
            <a th:if="${currentPage > 0}"
               th:href="@{/activityForm/submitted(page=${currentPage - 1}, size=${size})}">
                Previous
            </a>
            <span th:text="'Page ' + (${currentPage}+1) + ' of ' + ${totalPages}"></span>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/activityForm/submitted(page=${currentPage + 1}, size=${size})}">
                Next
            </a>
        </div>
    </div>
</body>
